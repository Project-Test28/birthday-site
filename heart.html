<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قلب الذكريات ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="heart.css">
</head>
<body>
    <canvas id="rainCanvas"></canvas>
    <div class="stars" id="starField"></div>
    
    <!-- حاوية الرسائل المتساقطة (خلف القلب) -->
    <div id="messageContainer" class="message-container"></div>
    
    <!-- جملة "أحبك للابد" فوق القلب -->
    <div class="love-text-top">❤️ أحبك للابد ❤️</div>
    
    <div class="heart-container" id="heartContainer"></div>
    
    <!-- الصورة المتحركة في منتصف القلب -->
    <img src="https://media1.giphy.com/media/4Fn2khYCDyKEBikRbn/giphy.gif" alt="Love Gif" class="heart-gif" id="heartGif">
    
    <!-- النص الجميل تحت القلب -->
    <div class="heart-text">❤️ إلى الأبد ❤️</div>

    <script src="heart.js"></script>
</body>
</html>
